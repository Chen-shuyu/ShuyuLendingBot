name: 持續整合與部署

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  test:
    name: 測試階段
    runs-on: ubuntu-latest
    steps:
      - name: 取出程式碼
        uses: actions/checkout@v4

      - name: 設定 Python 環境
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 安裝相依套件
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: 執行語法檢查
        run: python -m py_compile main.py config/settings.py modules/exchange_client.py modules/lending_strategy.py modules/line_notifier.py utils/logger.py

      - name: 執行 smoke test
        run: |
          python -c "from main import main; import sys; sys.exit(main())"

  deploy:
    name: 容器化部署階段
    if: github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/main'
    runs-on: [self-hosted, linux, shuyulendingbot]
    needs: test
    steps:
      - name: 取出程式碼
        uses: actions/checkout@v4

      - name: 建立 Podman 映像
        run: |
          podman build -t shuyu-lending-bot .

      - name: 停止並移除舊容器
        run: |
          if podman container exists shuyu-lending-bot; then
            podman stop shuyu-lending-bot || true
            podman rm shuyu-lending-bot || true
          fi

      - name: 啟動 Podman 容器
        run: |
          podman run -d \
            --name shuyu-lending-bot \
            -e BFX_SECRETS_FILE=/run/secrets/secrets.env \
            -v /workspace/deploy/active-bots/ShuyuLendingBot:/run/secrets:ro \
            -v /workspace/deploy/active-bots/ShuyuLendingBot/logs:/app/logs \
            shuyu-lending-bot

      - name: 檢查容器狀態
        run: podman ps --filter "name=shuyu-lending-bot"

      - name: 取得最近容器日誌
        run: podman logs --tail=100 shuyu-lending-bot
