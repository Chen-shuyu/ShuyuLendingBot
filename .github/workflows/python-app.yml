name: 持續整合

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: 取出程式碼
        uses: actions/checkout@v4

      - name: 設定 Python 環境
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 安裝相依套件
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: 執行語法檢查
        run: python -m py_compile main.py config/settings.py modules/exchange_client.py modules/lending_strategy.py modules/line_notifier.py utils/logger.py

      - name: 執行 smoke test
        run: |
          python -c "from main import main; import sys; sys.exit(main())"
